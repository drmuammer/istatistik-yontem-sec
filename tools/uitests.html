<!doctype html>
<html><head><meta charset="utf-8"><title>UI smoke</title>
<style>body{font-family:monospace;padding:2em}.ok{color:#15803d}.fail{color:#b91c1c}
#stage,#tree-stage,#result-stage{border:1px dashed #ccc;padding:1em;margin:1em 0}</style>
<link rel="stylesheet" href="../styles/main.css">
<link rel="stylesheet" href="../styles/wizard.css">
</head><body>
<h1>UI smoke testleri</h1>
<div id="results"></div>
<div id="stage"></div>
<script src="../lib/d3.v7.min.js"></script>
<script type="module">
import { createState } from '../js/state.js';
import { createI18n } from '../js/i18n.js';
import { renderWizard } from '../js/wizard.js';

const tree = await fetch('../data/tree.json').then(r => r.json());
const strings = await fetch('../data/strings.json').then(r => r.json());
const results = document.getElementById('results');
const stage = document.getElementById('stage');
function assert(label, cond, detail) {
  const div = document.createElement('div');
  div.className = cond ? 'ok' : 'fail';
  div.textContent = `[${cond ? 'OK' : 'FAIL'}] ${label}` + (detail ? ` — ${detail}` : '');
  results.appendChild(div);
}

const state = createState(tree);
const i18n = createI18n(strings);
renderWizard(stage, { tree, state, i18n });

assert('İlk render: kök sorusu', stage.querySelector('.wizard-question')?.textContent.includes('Verilerinizle'));
assert('İlk render: 3 seçenek', stage.querySelectorAll('.wizard-option').length === 3);
assert('Geri disabled (root)', stage.querySelector('.wizard-back')?.disabled === true);

stage.querySelector('.wizard-option[data-next="compare"]').click();
assert('Seçim sonrası ilerledi', stage.querySelector('.wizard-question')?.textContent.includes('tip'));
assert('Geri enabled', stage.querySelector('.wizard-back')?.disabled === false);

i18n.setLang('en');
assert('Dil → EN', stage.querySelector('.wizard-question')?.textContent.toLowerCase().includes('type'));

stage.querySelector('.wizard-back').click();
assert('Geri sonrası kök', stage.querySelector('.wizard-question')?.textContent.toLowerCase().includes('what'));
</script></body></html>
